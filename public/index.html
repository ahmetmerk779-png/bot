<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Minecraft WASD Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    #viewer-frame { width: 100%; height: 60vh; border: none; border-radius: 12px; }
    .control-btn { transition: all 0.1s; }
    .control-btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-gray-900 text-white p-4 font-sans">
  <div class="max-w-6xl mx-auto">
    <!-- Başlık -->
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        <span id="status-led" class="w-3 h-3 rounded-full bg-gray-500"></span>
        Minecraft WASD Bot
      </h1>
      <div class="flex gap-2">
        <button id="connect-btn" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg font-semibold">Bağlan</button>
        <button id="disconnect-btn" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-semibold">Kes</button>
      </div>
    </div>

    <!-- Bağlantı Ayarları -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-4">
      <input id="username" placeholder="Kullanıcı Adı" value="AFK_Bot" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2">
      <input id="server-ip" placeholder="Sunucu IP" value="localhost" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2">
      <input id="server-port" placeholder="Port" value="25565" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2">
      <input id="version" placeholder="Sürüm (1.18.2)" value="1.18.2" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2">
    </div>

    <!-- Canlı Harita -->
    <div class="mb-4">
      <iframe id="viewer-frame" src="/viewer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
    </div>

    <!-- Durum Paneli -->
    <div class="grid grid-cols-4 gap-3 mb-4 text-center">
      <div class="bg-gray-800 p-3 rounded-lg">
        <span class="text-gray-400 text-sm">❤️ Can</span>
        <div id="health" class="text-xl font-bold">--</div>
      </div>
      <div class="bg-gray-800 p-3 rounded-lg">
        <span class="text-gray-400 text-sm">🍗 Açlık</span>
        <div id="food" class="text-xl font-bold">--</div>
      </div>
      <div class="bg-gray-800 p-3 rounded-lg">
        <span class="text-gray-400 text-sm">👥 Oyuncu</span>
        <div id="players" class="text-xl font-bold">--</div>
      </div>
      <div class="bg-gray-800 p-3 rounded-lg">
        <span class="text-gray-400 text-sm">📶 Ping</span>
        <div id="ping" class="text-xl font-bold">--</div>
      </div>
    </div>

    <!-- WASD ve Eylemler -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="bg-gray-800 p-4 rounded-lg">
        <h3 class="text-center mb-2 text-gray-300">🎮 Hareket (WASD)</h3>
        <div class="grid grid-cols-3 gap-2 w-48 mx-auto">
          <div></div>
          <button id="move-forward" class="control-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-2xl">▲</button>
          <div></div>
          <button id="move-left" class="control-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-2xl">◀</button>
          <button id="move-back" class="control-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-2xl">▼</button>
          <button id="move-right" class="control-btn bg-gray-700 hover:bg-gray-600 p-4 rounded-lg text-2xl">▶</button>
        </div>
      </div>
      <div class="bg-gray-800 p-4 rounded-lg">
        <h3 class="text-center mb-2 text-gray-300">🕹️ Eylemler</h3>
        <div class="flex flex-wrap gap-2 justify-center">
          <button id="action-jump" class="control-btn bg-blue-600 hover:bg-blue-700 px-4 py-3 rounded-lg">🦘 Zıpla</button>
          <button id="action-sneak" class="control-btn bg-purple-600 hover:bg-purple-700 px-4 py-3 rounded-lg">🥷 Eğil</button>
          <button id="action-attack" class="control-btn bg-red-600 hover:bg-red-700 px-4 py-3 rounded-lg">⚔️ Sol Tık</button>
          <button id="action-use" class="control-btn bg-green-600 hover:bg-green-700 px-4 py-3 rounded-lg">🖱️ Sağ Tık</button>
        </div>
      </div>
    </div>

    <!-- Envanter & Sohbet -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-gray-800 p-4 rounded-lg">
        <h3 class="text-center mb-2 text-gray-300">🎒 Envanter</h3>
        <div id="inventory-grid" class="grid grid-cols-9 gap-1 max-h-48 overflow-y-auto p-2 bg-gray-900 rounded">
          <!-- Dinamik olarak doldurulacak -->
        </div>
      </div>
      <div class="bg-gray-800 p-4 rounded-lg">
        <h3 class="text-center mb-2 text-gray-300">💬 Sohbet / Komut</h3>
        <div class="flex gap-2">
          <input id="chat-input" type="text" placeholder="Mesaj veya /komut" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2">
          <button id="send-chat" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg">Gönder</button>
        </div>
        <p class="text-xs text-gray-500 mt-2">Komutlar: /ping, /help, vb.</p>
      </div>
    </div>
  </div>

  <script>
    const socket = io();
    const statusLed = document.getElementById('status-led');
    const healthEl = document.getElementById('health');
    const foodEl = document.getElementById('food');
    const playersEl = document.getElementById('players');
    const pingEl = document.getElementById('ping');
    const invGrid = document.getElementById('inventory-grid');

    // Bot durumu
    socket.on('bot-status', (data) => {
      statusLed.className = data.connected ? 'w-3 h-3 rounded-full bg-green-500' : 'w-3 h-3 rounded-full bg-gray-500';
    });

    socket.on('bot-data', (data) => {
      healthEl.textContent = data.health + '/20';
      foodEl.textContent = data.food + '/20';
      playersEl.textContent = data.players;
      pingEl.textContent = data.ping + 'ms';
    });

    socket.on('inventory-update', (items) => {
      invGrid.innerHTML = '';
      for (let i = 0; i < 45; i++) {
        const item = items.find(it => it.slot === i);
        invGrid.innerHTML += `<div class="bg-gray-700 p-1 text-xs rounded text-center h-8 flex items-center justify-center">${item ? item.displayName.substring(0,8) : ''}</div>`;
      }
    });

    // Bağlan / Kes
    document.getElementById('connect-btn').addEventListener('click', () => {
      const config = {
        username: document.getElementById('username').value,
        host: document.getElementById('server-ip').value,
        port: parseInt(document.getElementById('server-port').value) || 25565,
        version: document.getElementById('version').value
      };
      socket.emit('connect-bot', config);
    });

    document.getElementById('disconnect-btn').addEventListener('click', () => {
      socket.emit('disconnect-bot');
    });

    // WASD kontrol
    function holdControl(control, state) {
      socket.emit('set-control-state', { control, state });
    }

    ['forward', 'back', 'left', 'right'].forEach(dir => {
      const btn = document.getElementById(`move-${dir}`);
      btn.addEventListener('mousedown', () => holdControl(dir, true));
      btn.addEventListener('mouseup', () => holdControl(dir, false));
      btn.addEventListener('mouseleave', () => holdControl(dir, false));
    });

    document.getElementById('action-jump').addEventListener('click', () => socket.emit('perform-action', 'jump'));
    document.getElementById('action-sneak').addEventListener('click', () => socket.emit('perform-action', 'sneak'));
    document.getElementById('action-attack').addEventListener('click', () => socket.emit('perform-action', 'leftClick'));
    document.getElementById('action-use').addEventListener('click', () => socket.emit('perform-action', 'rightClick'));

    // Sohbet
    document.getElementById('send-chat').addEventListener('click', () => {
      const msg = document.getElementById('chat-input').value.trim();
      if (msg) {
        socket.emit('send-chat', msg);
        document.getElementById('chat-input').value = '';
      }
    });
  </script>
</body>
          </html>
