<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OVERLORD OS v6</title>
    <style>
        :root { --p: #bc13fe; --b: #00f3ff; --g: #39ff14; --dark: #0a0a0a; --card: #151515; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; }
        
        /* ANA EKRAN VE SAYFALAR */
        .screen-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        .page { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--dark); transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); 
            padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 10;
        }
        .page-hidden { transform: translateX(100%); } /* Gizli sayfalar sağda bekler */
        .page-active { transform: translateX(0); z-index: 20; }

        /* MENÜ İKONLARI (ANA EKRAN) */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .menu-item { 
            background: var(--card); border: 1px solid #222; border-radius: 20px; 
            padding: 25px; text-align: center; transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.9); background: #202020; }
        .menu-item i { font-size: 2rem; display: block; margin-bottom: 10px; }

        /* ALT SAYFA DİZAYNI */
        .header { display: flex; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .back-btn { font-size: 1.5rem; margin-right: 15px; color: var(--p); }
        .setting-row { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; 
        }
        input, select { 
            background: #000; border: 1px solid #333; color: var(--b); 
            padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; 
        }
        
        /* BUTONLAR */
        .action-btn { 
            background: linear-gradient(45deg, var(--p), #7a0bc0); border: none; 
            color: white; padding: 15px; border-radius: 15px; width: 100%; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="screen-container">
    
    <div id="home" class="page page-active">
        <h1 style="color: var(--p); text-shadow: 0 0 10px var(--p); margin-bottom: 0;">OVERLORD OS</h1>
        <p style="color: #555; font-size: 0.8rem; margin-top: 5px;">Sistem Durumu: BEKLEMEDE</p>
        
        <div class="menu-grid">
            <div class="menu-item" onclick="openPage('bot-settings')">
                <span style="font-size: 2rem;">🤖</span>
                <span style="display:block; margin-top:10px;">Bot Ayarı</span>
            </div>
            <div class="menu-item" onclick="openPage('mod-list')">
                <span style="font-size: 2rem;">🌌</span>
                <span style="display:block; margin-top:10px;">1000 Modül</span>
            </div>
            <div class="menu-item" onclick="openPage('war-room')">
                <span style="font-size: 2rem;">⚔️</span>
                <span style="display:block; margin-top:10px;">Savaş Odası</span>
            </div>
            <div class="menu-item" onclick="openPage('logs')">
                <span style="font-size: 2rem;">📜</span>
                <span style="display:block; margin-top:10px;">Raporlar</span>
            </div>
        </div>
    </div>

    <div id="bot-settings" class="page page-hidden">
        <div class="header">
            <span class="back-btn" onclick="closePage('bot-settings')">←</span>
            <h2 style="margin:0;">Bot Yapılandırma</h2>
        </div>
        <div class="setting-row">
            <label style="color:#888; font-size:0.7rem;">BOT İSMİ</label>
            <input type="text" id="botName" value="Zalith_Prime">
        </div>
        <div class="setting-row">
            <label style="color:#888; font-size:0.7rem;">SUNUCU ADRESİ (IP)</label>
            <input type="text" id="srvIP" value="play.falixnodes.net">
        </div>
        <div class="setting-row">
            <label style="color:#888; font-size:0.7rem;">MC VERSİYON</label>
            <select><option>1.20.1</option><option>1.19.4</option><option>1.8.9</option></select>
        </div>
        <button class="action-btn" onclick="save()">AYARLARI UYGULA</button>
    </div>

    <div id="mod-list" class="page page-hidden">
        <div class="header">
            <span class="back-btn" onclick="closePage('mod-list')">←</span>
            <h2 style="margin:0;">1000 Sistem Modülü</h2>
        </div>
        <div id="matrix-scroll" style="padding-bottom: 50px;">
            </div>
    </div>

    <div id="war-room" class="page page-hidden">
        <div class="header">
            <span class="back-btn" onclick="closePage('war-room')">←</span>
            <h2 style="margin:0;">Savaş & Sabotaj</h2>
        </div>
        <div class="menu-grid">
            <button class="action-btn" style="background:#222; border:1px solid var(--p);" onclick="vibrate()">PAZAR BOZUCU</button>
            <button class="action-btn" style="background:#222; border:1px solid var(--b);" onclick="vibrate()">ADMIN RADAR</button>
            <button class="action-btn" style="background:#222; border:1px solid var(--g);" onclick="vibrate()">AUTO PK</button>
            <button class="action-btn" style="background:#222; border:1px solid red;" onclick="vibrate()">KİLL AURA</button>
        </div>
    </div>

</div>

<script>
    // SAYFA GEÇİŞLERİ
    function openPage(id) {
        document.getElementById(id).classList.remove('page-hidden');
        document.getElementById(id).classList.add('page-active');
        if(window.navigator.vibrate) window.navigator.vibrate(20);
    }

    function closePage(id) {
        document.getElementById(id).classList.add('page-hidden');
        document.getElementById(id).classList.remove('page-active');
    }

    // 1000 MODÜL ÜRETİCİ
    const container = document.getElementById('matrix-scroll');
    for(let i=1; i<=1000; i++) {
        container.innerHTML += `
            <div style="background:var(--card); padding:15px; border-radius:15px; margin-bottom:8px; display:flex; justify-content:space-between;">
                <span>#${1000+i} Modül_${i}</span>
                <span style="color:var(--p); font-size:0.7rem;">HAZIR</span>
            </div>
        `;
    }

    function save() {
        if(window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
        alert("Bot yapılandırması güncellendi!");
        closePage('bot-settings');
    }

    function vibrate() { if(window.navigator.vibrate) window.navigator.vibrate(40); }

    // SOLA KAYDIRARAK GERİ ÇIKMA (OPPO GESTURE)
    let startX = 0;
    window.addEventListener('touchstart', e => startX = e.touches[0].clientX);
    window.addEventListener('touchend', e => {
        let diff = e.changedTouches[0].clientX - startX;
        if (diff > 100) { // Sağa kaydırınca geri çıkar
            const activePage = document.querySelector('.page-active:not(#home)');
            if(activePage) closePage(activePage.id);
        }
    });
</script>
</body>
</html>
