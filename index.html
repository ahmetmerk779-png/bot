<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZALITH NEURAL DASHBOARD</title>
    <style>
        :root { --p: #bc13fe; --b: #00f3ff; --g: #39ff14; --dark: #080808; --card: #121212; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #fff; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { height: 60px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--p); position: fixed; top: 0; width: 100%; z-index: 100; }
        .menu-btn { font-size: 28px; color: var(--b); cursor: pointer; }
        .title { margin-left: 15px; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; color: var(--b); }

        /* YAN MENÜ (3 ÇİZGİYE BASINCA AÇILAN) */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--card); z-index: 200; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); border-right: 2px solid var(--p); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 25px; background: #000; color: var(--p); font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #222; }
        
        /* 1000 ÖZELLİK LİSTESİ */
        .features-list { flex-grow: 1; overflow-y: auto; padding: 15px; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: #1a1a1a; border-radius: 12px; margin-bottom: 10px; border: 1px solid #252525; transition: 0.2s; }
        .feature-item:active { background: var(--p); transform: scale(0.98); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; box-shadow: 0 0 5px #000; }
        .status-dot.active { background: var(--g); box-shadow: 0 0 10px var(--g); }

        /* KONSOL (ANA EKRAN) */
        .console { height: 100vh; padding: 80px 15px 90px 15px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.8rem; color: #aaa; background: radial-gradient(circle at top, #111 0%, #080808 100%); }
        .msg { margin-bottom: 10px; border-left: 2px solid #222; padding-left: 10px; }
        .msg b { color: var(--g); }

        /* INPUT BAR */
        .input-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex-grow: 1; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; outline: none; border: 1px solid var(--b); }
        .send-btn { background: var(--p); border: none; padding: 0 20px; border-radius: 10px; color: #fff; font-weight: bold; font-size: 1.2rem; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; display: none; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggleM()">☰</div>
        <div class="title">NEURAL CORE v12 // STATUS: ONLINE</div>
    </div>

    <div class="overlay" id="ov" onclick="toggleM()"></div>

    <div class="sidebar" id="sb">
        <div class="sidebar-header">MODÜL MATRİSİ (1000+)</div>
        <div class="features-list" id="fl">
            </div>
    </div>

    <div class="console" id="con">
        <div class="msg"><b>[SİSTEM]:</b> Zalith Neural Dashboard başlatıldı.</div>
        <div class="msg"><b>[INFO]:</b> Oppo 12GB RAM optimizasyonu aktif.</div>
        <div class="msg"><b>[AI]:</b> Selam knk, 3 çizgiye basınca 1000 tane özellik seni bekliyor. Replit gibi süre dolma derdi yok!</div>
    </div>

    <div class="input-bar">
        <input type="text" placeholder="Komut yaz..." id="inp">
        <button class="send-btn" onclick="send()">></button>
    </div>

<script>
    function toggleM() {
        const sb = document.getElementById('sb');
        const ov = document.getElementById('ov');
        sb.classList.toggle('active');
        ov.style.display = (ov.style.display === 'block') ? 'none' : 'block';
        if(window.navigator.vibrate) window.navigator.vibrate(30);
    }

    // 1000 ÖZELLİK OLUŞTURUCU
    const fl = document.getElementById('fl');
    const hacks = { 1:'KillAura', 2:'Reach', 3:'AutoArmor', 4:'AdminRadar', 5:'PazarSabotaj', 6:'AntiKnockback', 7:'InventoryViewer', 8:'AutoEat' };
    
    for(let i=1; i<=1000; i++) {
        let name = hacks[i] || `Neural_Mod_${i+100}`;
        fl.innerHTML += `
            <div class="feature-item" onclick="vibe()">
                <span>${name}</span>
                <div class="status-dot ${i < 9 ? 'active' : ''}"></div>
            </div>
        `;
    }

    function send() {
        const i = document.getElementById('inp');
        const c = document.getElementById('con');
        if(i.value) {
            c.innerHTML += `<div class="msg"><b>></b> ${i.value}</div>`;
            i.value = "";
            c.scrollTop = c.scrollHeight;
        }
    }

    function vibe() { if(window.navigator.vibrate) window.navigator.vibrate(40); }
</script>
</body>
</html>
