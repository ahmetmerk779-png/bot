<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zalith ChatCraft</title>
    <style>
        :root { --bg: #121212; --side: #1c1c1c; --accent: #39ff14; --text: #e0e0e0; --purple: #bc13fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* HEADER (TOP BAR) */
        .header { height: 55px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; position: fixed; top: 0; width: 100%; z-index: 100; }
        .menu-btn { font-size: 24px; color: var(--accent); cursor: pointer; margin-right: 15px; }
        .server-info { font-size: 14px; font-weight: bold; color: var(--accent); }

        /* YAN MENÜ (SIDEBAR - 1000 ÖZELLİK BURADA) */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--side); z-index: 200; transition: 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); border-right: 1px solid #444; display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: #111; border-bottom: 1px solid #333; color: var(--purple); font-weight: bold; font-size: 1.1rem; }
        
        /* 1000 ÖZELLİK KAYDIRILABİLİR LİSTE */
        .features-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #252525; border-radius: 8px; margin-bottom: 8px; border: 1px solid #333; font-size: 0.9rem; }
        .feature-item:active { background: var(--purple); }
        .toggle-switch { width: 40px; height: 20px; background: #444; border-radius: 10px; position: relative; }
        .toggle-switch.on { background: var(--accent); }

        /* ANA KONSOL EKRANI (CHAT) */
        .console { height: 100vh; padding: 65px 15px 70px 15px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.85rem; }
        .msg { margin-bottom: 8px; line-height: 1.4; }
        .msg.system { color: #888; }
        .msg.ai { color: var(--accent); }

        /* ALT GİRİŞ ÇUBUĞU */
        .input-bar { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex-grow: 1; background: #222; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; }
        .send-btn { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }

        /* KARARTMA */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggleM()">☰</div>
        <div class="server-info">play.falixnodes.net • 1.20.1</div>
    </div>

    <div class="sidebar" id="sb">
        <div class="sidebar-header">ZALITH AI FEATURES</div>
        <div class="features-list" id="fl">
            </div>
    </div>

    <div class="overlay" id="ov" onclick="toggleM()"></div>

    <div class="console" id="console">
        <div class="msg system">[15:30:12] Zalith Neural Engine başlatılıyor...</div>
        <div class="msg system">[15:30:13] Sunucuya bağlanıldı: play.falixnodes.net</div>
        <div class="msg ai"><b>[AI]:</b> Selam knk, sistem hazır. Sol üstteki menüden 1000 tane özelliği kontrol edebilirsin.</div>
    </div>

    <div class="input-bar">
        <input type="text" placeholder="Komut yaz..." id="cmd">
        <button class="send-btn" onclick="send()">GÖNDER</button>
    </div>

<script>
    function toggleM() {
        const sb = document.getElementById('sb');
        const ov = document.getElementById('ov');
        if(sb.classList.contains('active')) {
            sb.classList.remove('active');
            ov.style.display = 'none';
        } else {
            sb.classList.add('active');
            ov.style.display = 'block';
        }
        if(window.navigator.vibrate) window.navigator.vibrate(20);
    }

    // 1000 ÖZELLİK LİSTESİ OLUŞTURMA (3 ÇİZGİ İÇİ)
    const fl = document.getElementById('fl');
    const specials = { 1:'Admin Radar', 2:'Pazar Sabotaj', 3:'Auto-Armor', 4:'Kill Aura', 5:'Anti-Knockback' };
    
    for(let i=1; i<=1000; i++) {
        let name = specials[i] || `Modül_${i}`;
        fl.innerHTML += `
            <div class="feature-item" onclick="vibrate()">
                <span>${name}</span>
                <div class="toggle-switch ${i < 6 ? 'on' : ''}"></div>
            </div>
        `;
    }

    function send() {
        const inp = document.getElementById('cmd');
        const con = document.getElementById('console');
        if(inp.value) {
            con.innerHTML += `<div class="msg">> ${inp.value}</div>`;
            inp.value = "";
            con.scrollTop = con.scrollHeight;
        }
    }

    function vibrate() { if(window.navigator.vibrate) window.navigator.vibrate(30); }
</script>
</body>
</html>
