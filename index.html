<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatCraft Master</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Resimlerdeki Kırmızı Header */
        .header { background: #e53935; color: white; padding: 15px; display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .header-title { flex: 1; font-size: 18px; }

        /* ChatCraft Alt Menü (Sekmeler) */
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: #777; white-space: nowrap; }
        .tab-btn.active { color: #e53935; border-bottom: 3px solid #e53935; }

        .content { flex: 1; display: none; overflow-y: auto; padding: 10px; }
        .content.active { display: block; }

        /* Radar ve Hareket (Resim 1000264946) */
        #radar-canvas { background: #f0f0f0; display: block; margin: 0 auto; border: 1px solid #ccc; }
        .joy { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 150px; margin: 20px auto; }
        .btn-ctrl { padding: 15px; background: #eee; border: 1px solid #ccc; border-radius: 5px; text-align: center; }

        /* Oyuncu Listesi (Resim 1000264947) */
        .p-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }

        /* GUI Menü (Resim 1000264950) */
        #gui-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:100; padding:20px; }
        .gui-box { background:white; border-radius:10px; height:80%; display:flex; flex-direction:column; }
        .gui-list { flex:1; overflow-y:auto; padding:10px; }

        .footer { padding: 10px; border-top: 1px solid #eee; display: flex; gap: 5px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <span onclick="location.reload()">←</span>
        <div class="header-title" id="h-title">Sohbet</div>
        <div id="hp" style="font-size:12px;">❤ --</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="tab(event, 'chat-tab', 'Sohbet')">SOHBET</button>
        <button class="tab-btn" onclick="tab(event, 'move-tab', 'Hareket')">HAREKET</button>
        <button class="tab-btn" onclick="tab(event, 'plist-tab', 'Oyuncular')">OYUNCULAR</button>
        <button class="tab-btn" onclick="tab(event, 'inv-tab', 'Envanter')">ENVANTER</button>
    </div>

    <div id="chat-tab" class="content active"></div>
    <div id="move-tab" class="content">
        <canvas id="radar-canvas" width="180" height="180"></canvas>
        <div id="pos-info" style="text-align:center; padding:10px; font-weight:bold;">X:0 Y:0 Z:0</div>
        <div class="joy">
            <div></div><button class="btn-ctrl" ontouchstart="cmd('forward',true)" ontouchend="cmd('forward',false)">▲</button><div></div>
            <button class="btn-ctrl" ontouchstart="cmd('left',true)" ontouchend="cmd('left',false)">◀</button>
            <button class="btn-ctrl" ontouchstart="cmd('back',true)" ontouchend="cmd('back',false)">▼</button>
            <button class="btn-ctrl" ontouchstart="cmd('right',true)" ontouchend="cmd('right',false)">▶</button>
        </div>
    </div>
    <div id="plist-tab" class="content"></div>
    <div id="inv-tab" class="content"></div>

    <div id="gui-overlay">
        <div class="gui-box">
            <div style="padding:15px; border-bottom:1px solid #eee; font-weight:bold; display:flex; justify-content:space-between;">
                <span id="gt">MENÜ</span><button onclick="document.getElementById('gui-overlay').style.display='none'" style="color:red; border:none; background:none;">KAPAT</button>
            </div>
            <div id="gc" class="gui-list"></div>
        </div>
    </div>

    <div class="footer">
        <input type="text" id="mI" placeholder="Mesaj gönder..." onkeydown="if(event.key==='Enter')send()">
        <button onclick="launch()" style="background:#e53935; color:white; border:none; padding:10px; border-radius:5px;">BAĞLAN</button>
    </div>

    <script>
        const socket = io();
        const ctx = document.getElementById('radar-canvas').getContext('2d');

        function tab(e, n, t) {
            let cs = document.getElementsByClassName("content");
            for (let i=0; i<cs.length; i++) cs[i].style.display = "none";
            let ts = document.getElementsByClassName("tab-btn");
            for (let i=0; i<ts.length; i++) ts[i].classList.remove("active");
            document.getElementById(n).style.display = "block";
            e.currentTarget.classList.add("active");
            document.getElementById('h-title').innerText = t;
        }

        function launch() { const ip = prompt("Sunucu IP:"); if(ip) socket.emit('launch', {ip}); }
        function send() { const i=document.getElementById('mI'); if(i.value){socket.emit('send',i.value); i.value='';} }
        function cmd(d, s) { socket.emit('cmd', {d, s}); }

        socket.on('msg', d => {
            const b = document.getElementById('chat-tab');
            b.innerHTML += `<div style="margin-bottom:5px;"><b>${d.u}:</b> ${d.m}</div>`;
            b.scrollTop = b.scrollHeight;
        });

        socket.on('st', d => {
            document.getElementById('pos-info').innerText = d.pos;
            document.getElementById('hp').innerText = `❤ ${d.hp}`;
            
            // Radar
            ctx.clearRect(0,0,180,180);
            ctx.fillStyle='#e53935'; ctx.save(); ctx.translate(90,90); ctx.rotate(d.yaw+Math.PI);
            ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-6,6); ctx.lineTo(6,6); ctx.fill(); ctx.restore();

            // Oyuncu Listesi
            document.getElementById('plist-tab').innerHTML = d.players.map(p => `<div class="p-item">👤 ${p}</div>`).join('');
            // Envanter
            document.getElementById('inv-tab').innerHTML = d.inventory.map(i => `<div class="p-item">📦 ${i.name} (x${i.count})</div>`).join('');
        });

        socket.on('gui', d => {
            document.getElementById('gui-overlay').style.display = 'block';
            document.getElementById('gt').innerText = d.title;
            document.getElementById('gc').innerHTML = d.items.map(i => `
                <div class="p-item" onclick="socket.emit('gui-click',${i.slot}); document.getElementById('gui-overlay').style.display='none';" style="color:#e53935; font-weight:bold;">
                    ${i.name} (x${i.count})
                </div>`).join('');
        });
    </script>
</body>
</html>
