<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER V5</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #view { flex: 1; border: 1px solid #333; background: #111; }
        #log { height: 150px; overflow-y: auto; padding: 10px; font-size: 12px; border-top: 2px solid #8e44ad; }
        .btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        button { padding: 15px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
        input { background: #111; color: #fff; border: 1px solid #444; padding: 10px; width: 100%; }
    </style>
</head>
<body>
    <div id="view"><iframe id="f" src="" style="width:100%; height:100%; border:none;"></iframe></div>
    <div id="log">Sistem hazır...</div>
    <input type="text" id="m" placeholder="Mesaj yaz ve Enter'a bas..." onchange="send()">
    <div class="btns">
        <button onclick="launch()">🚀 BAGLAN</button>
        <button ontouchstart="mv('forward',true)" ontouchend="mv('forward',false)">▲ YURU</button>
        <button onclick="socket.emit('send-chat','/spawn')">🏠 SPAWN</button>
    </div>

    <script>
        const socket = io();
        function send() { socket.emit('send-chat', document.getElementById('m').value); document.getElementById('m').value=''; }
        function launch() { const ip = prompt("IP Gir:"); socket.emit('launch-bot', {ip, version:'1.16.5'}); }
        function mv(dir, state) { socket.emit('move', {dir, state}); }
        socket.on('log', m => { const l=document.getElementById('log'); l.innerHTML+=`<div>${m}</div>`; l.scrollTop=l.scrollHeight; });
    </script>
</body>
</html>
