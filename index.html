<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f4f4f4; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #e53935; color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        /* Sunucu Listesi Kartları (Resim 1000264944) */
        .server-card { background: white; margin: 10px; padding: 15px; border-radius: 8px; border-left: 5px solid #e53935; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .server-name { font-size: 18px; font-weight: bold; color: #333; }
        .server-ver { font-size: 12px; color: #e53935; background: #ffebee; padding: 2px 5px; border-radius: 3px; float: right; }

        /* ChatCraft Tarzı Sohbet Alanı (Resim 1000264945) */
        #chat-area { flex: 1; overflow-y: auto; padding: 15px; background: white; display: none; }
        .msg { margin-bottom: 8px; font-size: 14px; line-height: 1.4; }
        .msg b { color: #e53935; }

        /* Mesaj Atma Yeri */
        .input-bar { display: none; padding: 10px; background: white; border-top: 1px solid #ddd; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .send-btn { background: #e53935; color: white; border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; }

        .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; display: none; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: #888; font-size: 12px; }
        .active-tab { color: #e53935; border-bottom: 3px solid #e53935; }
    </style>
</head>
<body>

    <div class="header">
        <span id="back-btn" style="display:none;" onclick="location.reload()">←</span>
        <span id="title">ChatCraft Clone</span>
        <span id="hp-display"></span>
    </div>

    <div id="lobby">
        <div style="padding: 15px; color: #666; text-align: center;">Sunucular - Bağlanmak için tıkla</div>
        <div id="server-container"></div>
    </div>

    <div class="tabs" id="main-tabs">
        <button class="tab-btn active-tab" onclick="switchTab('chat-area')">SOHBET</button>
        <button class="tab-btn" onclick="switchTab('player-list')">OYUNCULAR</button>
    </div>

    <div id="chat-area"></div>
    <div id="player-list" style="display:none; padding:15px; background:white; flex:1;"></div>

    <div class="input-bar" id="input-bar">
        <input type="text" id="chatInput" placeholder="Mesaj gönder..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // Sunucu listesini oluştur
        socket.on('server-list', (servers) => {
            const container = document.getElementById('server-container');
            container.innerHTML = servers.map(s => `
                <div class="server-card" onclick="connect('${s.ip}', '${s.ver}')">
                    <span class="server-ver">${s.ver}</span>
                    <div class="server-name">${s.name}</div>
                    <div style="font-size:12px; color:#888; margin-top:5px;">${s.ip}</div>
                    <div style="font-size:11px; color:#e53935; margin-top:5px;">${s.desc}</div>
                </div>
            `).join('');
        });

        function connect(ip, ver) {
            socket.emit('launch', { ip, ver });
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('chat-area').style.display = 'block';
            document.getElementById('input-bar').style.display = 'flex';
            document.getElementById('main-tabs').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('title').innerText = 'Sohbet';
        }

        function sendMessage() {
            const inp = document.getElementById('chatInput');
            if(inp.value) {
                socket.emit('send-chat', inp.value);
                inp.value = '';
            }
        }

        socket.on('new-msg', d => {
            const area = document.getElementById('chat-area');
            area.innerHTML += `<div class="msg"><b>${d.u}:</b> ${d.m}</div>`;
            area.scrollTop = area.scrollHeight;
        });

        socket.on('sys-msg', m => {
            document.getElementById('chat-area').innerHTML += `<div style="color:gray; font-style:italic; margin:5px 0;">${m}</div>`;
        });

        function switchTab(id) {
            document.getElementById('chat-area').style.display = id === 'chat-area' ? 'block' : 'none';
            document.getElementById('player-list').style.display = id === 'player-list' ? 'block' : 'none';
            document.getElementById('input-bar').style.display = id === 'chat-area' ? 'flex' : 'none';
        }
    </script>
</body>
</html>
