<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AESIR MC | AI AGENT PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --accent: #00ff88;
            --ai-color: #00d2ff;
            --danger: #ff4444;
            --text: #e0e0e0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Stat Kartları */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Konsol / Terminal */
        #log {
            height: 180px;
            overflow-y: auto;
            background: #000;
            border-radius: 8px;
            padding: 10px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            border: 1px solid #222;
            line-height: 1.4;
        }

        .ai-msg { color: var(--ai-color); font-weight: bold; }

        /* Buton Tasarımları */
        .btn-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        button {
            padding: 12px 5px;
            border-radius: 8px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-normal { background: #333; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-ai { background: var(--ai-color); color: #000; }
        .btn-danger { background: var(--danger); }

        /* Hareket Paneli */
        .move-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 140px;
            margin: 0 auto;
            gap: 5px;
        }

        /* Inputlar */
        .input-box {
            display: flex;
            gap: 5px;
            background: #222;
            padding: 5px;
            border-radius: 10px;
            border: 1px solid #444;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="stat-grid">
        <div class="card">
            <div class="card-title">📡 RADAR</div>
            <div id="radar" style="font-size: 12px; color: var(--accent);">Tarama...</div>
        </div>
        <div class="card">
            <div class="card-title">🎒 ENVANTER</div>
            <div id="env" style="font-size: 11px; color: #aaa;">Boş</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">💻 TERMİNAL & AI LOG</div>
        <div id="log"></div>
    </div>

    <div class="card" style="border-left: 4px solid var(--ai-color);">
        <div class="card-title" style="color: var(--ai-color);">🤖 AI AGENT - YENİ ÖZELLİK KODLA</div>
        <div class="input-box">
            <input type="text" id="ai-task" placeholder="Örn: Zombi görünce saldır...">
            <button class="btn-ai" onclick="teachAI()">KODLA</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">🎮 KONTROLLER</div>
        <div class="move-grid">
            <div></div><button class="btn-normal" onclick="move('forward')">▲</button><div></div>
            <button class="btn-normal" onclick="move('left')">◀</button>
            <button class="btn-accent" onclick="move('jump')">JUMP</button>
            <button class="btn-normal" onclick="move('right')">▶</button>
            <div></div><button class="btn-normal" onclick="move('back')">▼</button><div></div>
        </div>
        
        <div class="btn-group">
            <button class="btn-danger" onclick="sendCmd('/login 123456')">GİRİŞ</button>
            <button class="btn-accent" onclick="socket.emit('go_asmp')">ASMP GİR</button>
            <button class="btn-normal" onclick="sendCmd('/spawn')">SPAWN</button>
            <button class="btn-normal" onclick="sendCmd('/eat')">YEMEK</button>
            <button class="btn-normal" onclick="sendCmd('/fix')">TAMİR</button>
            <button class="btn-danger" onclick="location.reload()">YENİLE</button>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="cmd" placeholder="Komut veya mesaj...">
        <button class="btn-accent" onclick="sendManual()" style="width: 80px;">GÖNDER</button>
    </div>

    <script>
        const socket = io();
        const logEl = document.getElementById('log');

        socket.on('msg', d => {
            const div = document.createElement('div');
            if(d.username === 'AGENT' || d.username === 'SİSTEM') div.className = 'ai-msg';
            div.innerHTML = `<span>[${d.username}]</span> ${d.message}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        });

        socket.on('update', d => {
            document.getElementById('radar').innerHTML = d.players.map(p => `• ${p.name} (${p.dist}m)`).join('<br>') || 'Kimse yok';
            document.getElementById('env').innerText = d.items.slice(0, 3).join(', ') || 'Boş';
        });

        function sendCmd(c) { socket.emit('command', c); }
        function sendManual() { 
            const val = document.getElementById('cmd').value;
            if(val) { socket.emit('command', val); document.getElementById('cmd').value = ''; }
        }
        function teachAI() {
            const task = document.getElementById('ai-task').value;
            if(task) {
                socket.emit('command', `bot yeni özellik ${task}`);
                document.getElementById('ai-task').value = '';
                alert("Yapay zeka kodu yazmaya başladı!");
            }
        }
        function move(dir) { socket.emit('move', dir); }
    </script>
</body>
</html>
