<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER TERMINAL V5</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --p: #8e44ad; --g: #2ecc71; --b: #3498db; --gray: #222; }
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; user-select: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1.5fr 1fr; height: 100vh; gap: 2px; }
        .box { background: #0a0a0a; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; }
        
        /* OYUN EKRANI */
        iframe { width: 100%; height: 100%; border: none; }

        /* JOYSTICK & HAREKET */
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 20px; align-self: center; }
        .btn { background: var(--gray); color: #fff; border: 2px solid #444; padding: 15px; border-radius: 10px; font-weight: bold; text-align: center; }
        .btn:active { background: #555; }

        /* ENVANTER IZGARASI */
        .inv-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 2px; padding: 5px; background: #111; height: 100%; overflow-y: auto; }
        .slot { background: #333; border: 1px solid #555; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 8px; position: relative; }
        .slot span { position: absolute; bottom: 1px; right: 1px; background: rgba(0,0,0,0.5); font-size: 7px; }
        .active-slot { border: 2px solid var(--g); background: #444; }

        /* SOHBET */
        #log { flex: 1; padding: 5px; font-size: 10px; overflow-y: auto; color: #ccc; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="box" style="grid-column: 1 / 3;">
            <iframe id="v" src=""></iframe> </div>

        <div class="box">
            <div id="log">Sohbet Bekleniyor...</div>
            <div style="display:flex;"><input type="text" id="m" style="flex:1; background:#111; color:#fff; border:1px solid #333;"><button onclick="send()">></button></div>
            <div class="inv-grid" id="inv"></div> </div>

        <div class="box">
            <div class="controls">
                <div></div><div class="btn" ontouchstart="mv('forward',true)" ontouchend="mv('forward',false)">▲</div><div></div>
                <div class="btn" ontouchstart="mv('left',true)" ontouchend="mv('left',false)">◀</div>
                <div class="btn" onclick="socket.emit('jump',true);setTimeout(()=>socket.emit('jump',false),200)">JMP</div>
                <div class="btn" ontouchstart="mv('right',true)" ontouchend="mv('right',false)">▶</div>
                <div class="btn" onclick="socket.emit('attack')">HIT</div>
                <div class="btn" ontouchstart="mv('back',true)" ontouchend="mv('back',false)">▼</div>
                <div class="btn" onclick="socket.emit('drop-item')" style="background:var(--r)">DRP</div>
            </div>
            <button onclick="launch()" style="background:var(--g); border:none; color:#fff; padding:10px;">SUNUCUYA BAĞLAN</button>
        </div>
    </div>

    <script>
        const socket = io();
        function mv(d,s) { socket.emit('move', d, s); }
        function send() { socket.emit('send-chat', document.getElementById('m').value); document.getElementById('m').value=''; }
        function launch() { socket.emit('launch-bot', {ip: prompt('Sunucu IP:'), version: '1.16.5'}); }

        socket.on('inv-full', d => {
            const container = document.getElementById('inv');
            container.innerHTML = d.map(s => `
                <div class="slot ${s.slot < 9 ? 'active-slot' : ''}" onclick="socket.emit('select-slot', ${s.slot})">
                    ${s.name !== 'empty' ? s.name.substring(0,3) : ''}
                    <span>${s.count > 0 ? s.count : ''}</span>
                </div>
            `).join('');
        });

        socket.on('log', m => { const l=document.getElementById('log'); l.innerHTML+=`<div>${m}</div>`; l.scrollTop=l.scrollHeight; });
    </script>
</body>
</html>
