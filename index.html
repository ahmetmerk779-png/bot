<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASTER CORE V6</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow: hidden; }
        .monitor { border: 2px solid #333; height: 40vh; margin-bottom: 10px; padding: 10px; background: #050505; position: relative; }
        .stat-box { position: absolute; top: 10px; right: 10px; text-align: right; color: #ff004c; }
        #log { height: 30vh; overflow-y: auto; border-bottom: 1px solid #222; font-size: 12px; margin-bottom: 10px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        button { padding: 12px; background: #111; color: #0f0; border: 1px solid #0f0; border-radius: 5px; font-weight: bold; }
        button:active { background: #0f0; color: #000; }
        input { width: 100%; background: #000; border: 1px solid #333; color: #0f0; padding: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="monitor" id="mon">
        <div>>> RADAR AKTIF</div>
        <div id="xyz">XYZ: 0 / 0 / 0</div>
        <div id="players" style="color:cyan">YAKINDA KİMSE YOK</div>
        <div class="stat-box" id="hp">CAN: -- | AÇLIK: --</div>
        <div style="position:absolute; bottom:10px; left:10px; font-size:10px; color:#444;">CANVAS BYPASS MODE</div>
    </div>

    <div id="log">Sistem komuta hazır...</div>
    
    <div class="controls">
        <button onclick="launch()">📡 BAGLAN</button>
        <button ontouchstart="mv('forward',true)" ontouchend="mv('forward',false)">▲</button>
        <button onclick="socket.emit('send-chat','/spawn')">🏠</button>
        <button ontouchstart="mv('left',true)" ontouchend="mv('left',false)">◀</button>
        <button ontouchstart="mv('back',true)" ontouchend="mv('back',false)">▼</button>
        <button ontouchstart="mv('right',true)" ontouchend="mv('right',false)">▶</button>
    </div>
    <input type="text" id="mI" placeholder="Mesaj gönder..." onchange="send()">

    <script>
        const socket = io();
        function launch() { const ip = prompt("IP Gir:"); socket.emit('launch-bot', {ip}); }
        function mv(dir, state) { socket.emit('move', {dir, state}); }
        function send() { socket.emit('send-chat', document.getElementById('mI').value); document.getElementById('mI').value=''; }
        
        socket.on('log', m => { const l=document.getElementById('log'); l.innerHTML+=`<div>${m}</div>`; l.scrollTop=l.scrollHeight; });
        
        socket.on('bot-stats', d => {
            document.getElementById('xyz').innerText = `XYZ: ${d.pos.x} / ${d.pos.y} / ${d.pos.z}`;
            document.getElementById('hp').innerText = `CAN: %${d.hp*5} | AÇLIK: %${d.food*5}`;
            document.getElementById('players').innerText = d.near.length ? "YAKINDAKİLER: " + d.near.join(', ') : "YAKINDA KİMSE YOK";
        });
    </script>
</body>
</html>
