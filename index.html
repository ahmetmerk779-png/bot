<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZALITH NEURAL INTERFACE</title>
    <style>
        :root { --p: #bc13fe; --b: #00f3ff; --g: #39ff14; --r: #ff3131; --y: #ffd700; --dark: #020202; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: #fff; font-family: 'Consolas', monospace; overflow: hidden; height: 100vh; }

        /* 3 ÇİZGİ MENÜ & OVERLAY */
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 200; font-size: 1.8rem; color: var(--b); background: rgba(0,0,0,0.8); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--b); box-shadow: 0 0 15px var(--b); }
        .side-menu { position: fixed; top: 0; left: 0; width: 85vw; height: 100vh; background: #080808; z-index: 190; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); border-right: 2px solid var(--p); padding: 30px; box-sizing: border-box; }
        .menu-open { transform: translateX(0); }
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); display: none; z-index: 180; backdrop-filter: blur(5px); }

        /* ANA EKRAN DÜZENİ */
        .screen { height: 100vh; display: flex; flex-direction: column; padding: 15px; padding-top: 80px; box-sizing: border-box; gap: 15px; }

        /* CANLI AI ÇEKİRDEĞİ (NEURAL ENGINE) */
        .ai-core-box { height: 25vh; border: 1px solid var(--p); border-radius: 20px; background: rgba(188, 19, 254, 0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .ai-orb { width: 80px; height: 80px; background: radial-gradient(circle, var(--p) 0%, transparent 70%); border-radius: 50%; animation: pulse 1.5s infinite alternate; box-shadow: 0 0 40px var(--p); position: relative; }
        .ai-ring { position: absolute; width: 100px; height: 100px; border: 1px solid var(--b); border-radius: 50%; border-top-color: transparent; animation: spin 2s linear infinite; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* GÖRSEL ENVANTER (36 SLOT) */
        .inv-section { border: 1px solid #333; border-radius: 15px; padding: 10px; background: #0a0a0a; }
        .inv-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
        .slot { aspect-ratio: 1; background: #111; border: 1px solid #222; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1rem; position: relative; }
        .count { position: absolute; bottom: 1px; right: 1px; font-size: 0.5rem; color: var(--y); }

        /* 1000 MODÜL LİSTESİ (MASTER MATRIX) */
        .matrix-box { flex-grow: 1; border: 1px solid var(--g); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; background: rgba(0,0,0,0.5); }
        .matrix-header { background: var(--g); color: #000; padding: 5px 15px; font-weight: bold; font-size: 0.8rem; }
        .matrix-list { overflow-y: scroll; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .mod-row { display: flex; justify-content: space-between; font-size: 0.7rem; border-bottom: 1px solid #111; padding: 5px 0; }

        /* AYARLAR VE GİRİŞLER */
        input, select { width: 100%; background: #000; border: 1px solid #333; color: var(--b); padding: 12px; border-radius: 8px; margin-bottom: 10px; font-family: monospace; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="menu-btn" onclick="toggle()">☰</div>
    <div class="overlay" id="overlay" onclick="toggle()"></div>

    <div id="menu" class="side-menu">
        <h2 style="color:var(--p); border-bottom:1px solid #222; padding-bottom:10px;">SYSTEM MENU</h2>
        <div style="margin-top:20px;">
            <p style="color:#888; font-size:0.7rem;">BOT YAPILANDIRMA</p>
            <input type="text" id="botName" value="ZALITH_BOT_01">
            <input type="text" id="srvIP" value="play.falixnodes.net">
            <select id="ver"><option>1.20.1</option><option>1.19.4</option><option>1.16.5</option></select>
            <button class="btn" onclick="apply()">AYARLARI UYGULA</button>
        </div>
        <div style="margin-top:40px; color:var(--r);" onclick="toggle()">[ KAPAT ]</div>
    </div>

    <div class="screen">
        <div class="ai-core-box">
            <div class="ai-ring"></div>
            <div class="ai-orb"></div>
            <div style="margin-top:15px; font-size:0.7rem; letter-spacing:2px; color:var(--b)" id="aiStatus">NEURAL ENGINE: ACTIVE</div>
            <div id="aiLog" style="font-size:0.5rem; color:#555; margin-top:5px;">>> Data packets encrypted.</div>
        </div>

        <div class="inv-section">
            <div style="font-size:0.6rem; color:#555; margin-bottom:5px;">LIVE INVENTORY (36 SLOTS)</div>
            <div class="inv-grid" id="invGrid"></div>
        </div>

        <div class="matrix-box">
            <div class="matrix-header">MASTER MATRIX - 1000 ACTIVE MODULES</div>
            <div class="matrix-list" id="matrixList"></div>
        </div>
    </div>

<script>
    // MENÜ FONKSİYONU
    function toggle() {
        document.getElementById('menu').classList.toggle('menu-open');
        document.getElementById('overlay').style.display = (document.getElementById('overlay').style.display === 'block') ? 'none' : 'block';
    }

    // ENVANTER OLUŞTURMA
    const inv = document.getElementById('invGrid');
    const items = { 0:'⚔️', 1:'🛡️', 3:'💎', 4:'🍎', 8:'🧪' };
    for(let i=0; i<36; i++) {
        inv.innerHTML += `<div class="slot">${items[i] || ''}${items[i] ? '<span class="count">64</span>' : ''}</div>`;
    }

    // 1000 MODÜL OLUŞTURMA
    const list = document.getElementById('matrixList');
    const special = { 101:'Admin Radar', 801:'Pazar Sabotaj', 135:'Auto-Armor', 951:'Self-Destruct' };
    for(let i=1; i<=1000; i++) {
        let name = special[i] || `Module_Opt_${i}`;
        list.innerHTML += `<div class="mod-row"><span>[#${1000+i}] ${name}</span><span style="color:var(--g)">RUNNING</span></div>`;
    }

    // AYAR UYGULAMA
    function apply() {
        if(window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
        document.getElementById('aiStatus').innerText = "CONFIG UPDATED";
        setTimeout(() => document.getElementById('aiStatus').innerText = "NEURAL ENGINE: ACTIVE", 2000);
        toggle();
    }

    // CANLI LOG AKIŞI
    setInterval(() => {
        const logs = [">> Analyzing packets...", ">> Admin detected in vanish.", ">> Market data synced.", ">> Memory 12GB: OK"];
        document.getElementById('aiLog').innerText = logs[Math.floor(Math.random()*logs.length)];
    }, 3000);
</script>
</body>
</html>
