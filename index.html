<div id="radar-container" style="background:#000; height:180px; display:flex; justify-content:center; align-items:center; border-bottom:2px solid #e53935; position:relative;">
    <canvas id="radar" width="160" height="160" style="border:1px solid #333;"></canvas>
    <div style="position:absolute; top:5px; left:5px; font-size:10px; color:#0f0;">📡 RADAR_V2</div>
</div>

<script>
    const canvas = document.getElementById('radar');
    const ctx = canvas.getContext('2d');

    socket.on('radar-data', d => {
        ctx.clearRect(0, 0, 160, 160);
        const size = 32; // 32x32 tarama alanı
        const pSize = 5; // Piksel boyutu

        // Blokları Çiz
        d.map.forEach((b, i) => {
            if (b === 1) {
                const x = (i % size) * pSize;
                const z = Math.floor(i / size) * pSize;
                ctx.fillStyle = '#444';
                ctx.fillRect(x, z, pSize, pSize);
            }
        });

        // Diğer Oyuncuları Çiz (Kırmızı Noktalar)
        d.players.forEach(p => {
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(80 + (p.x * 2), 80 + (p.z * 2), 3, 0, Math.PI * 2);
            ctx.fill();
        });

        // Botun Kendisi (Merkezdeki Yeşil Ok)
        ctx.fillStyle = '#0f0';
        ctx.save();
        ctx.translate(80, 80);
        ctx.rotate(d.yaw + Math.PI); // Botun baktığı yöne çevir
        ctx.beginPath();
        ctx.moveTo(0, -6);
        ctx.lineTo(-4, 4);
        ctx.lineTo(4, 4);
        ctx.fill();
        ctx.restore();
    });
</script>
