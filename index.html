<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OVERLORD CORE V3 | 1000+ MODS</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --gold: #ffd700;
            --bg: #000000;
        }

        body {
            background-color: var(--bg);
            color: #eee;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            user-select: none;
        }

        /* MOBİL OPTİMİZE PANEL */
        .dashboard {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h2 { margin: 0 0 15px 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; border-left: 4px solid var(--neon-blue); padding-left: 10px; }

        /* CANLI LOG AKIŞI */
        .log-box {
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--neon-green);
            height: 100px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        /* 1000 ÖZELLİK LİSTESİ (MASTER MATRIX) */
        .matrix-container {
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .feature-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            border-left: 3px solid var(--gold);
        }

        .feat-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); font-size: 0.85rem; }
        .feat-desc { color: #aaa; font-size: 0.7rem; margin-top: 4px; font-style: italic; }
        .status-tag { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; background: rgba(57, 255, 20, 0.2); color: var(--neon-green); }

        /* ARAMA */
        #searchBox {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .nav-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(to bottom, #111, transparent);
            color: var(--neon-purple);
            font-weight: bold;
            font-size: 1.4rem;
            text-shadow: 0 0 10px var(--neon-purple);
        }
    </style>
</head>
<body>

    <div class="nav-header">THE OVERLORD CORE v3</div>

    <div class="dashboard">
        
        <div class="glass-card" style="border-color: var(--neon-blue);">
            <h2 style="color: var(--neon-blue); border-color: var(--neon-blue);">🛡️ Sentinel (UptimeRobot)</h2>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>Bağlantı: <b style="color: var(--neon-green);">AKTİF</b></span>
                <span>Ping: <b style="color: var(--neon-blue);">14ms</b></span>
            </div>
            <div class="log-box" id="networkLogs">>> UptimeRobot: Heartbeat sent... OK</div>
        </div>

        <div class="glass-card" style="border-color: var(--neon-purple);">
            <h2 style="color: var(--neon-purple); border-color: var(--neon-purple);">🧠 Neural Core (AI Brain)</h2>
            <div class="log-box" id="aiLogs" style="color: var(--neon-purple);">>> AI Modülü #1000: Çevreyi analiz ediyor...</div>
        </div>

        <div class="glass-card" style="border-color: var(--gold);">
            <h2 style="color: var(--gold); border-color: var(--gold);">🌌 Master Matrix (1000+ Mods)</h2>
            <input type="text" id="searchBox" placeholder="Özellik ara (Örn: Pazar, Admin)...">
            <div class="matrix-container" id="matrixList">
                </div>
        </div>

    </div>

    <script>
        // 1000 ÖZELLİK VERİ TABANI
        const featureData = [
            {id: 1000, n: "Neural Core AI", d: "Karar alma ve strateji geliştirme motoru.", s: "ACTIVE"},
            {id: 1121, n: "Admin Radar (Vanish Detect)", d: "Görünmez adminleri paket gecikmesinden saptar.", s: "STANDBY"},
            {id: 1801, n: "Market Sabotage #801", d: "Pazar fiyatlarını sunucu genelinde manipüle eder.", s: "ACTIVE"},
            {id: 1135, n: "Auto-Armor & Potion", d: "Savaş sırasında otomatik zırh ve iksir değişimi.", s: "ACTIVE"},
            {id: 1951, n: "Self-Destruct (Panic)", d: "Admin baskınında tüm verileri ve botu imha eder.", s: "READY"},
            {id: 1050, n: "Ghost Mining", d: "Blok kırmadan madenlerin içini tarar.", s: "ACTIVE"},
            {id: 1088, n: "Chat Mimicry", d: "Admin sorularına senin tarzınla cevap verir.", s: "ACTIVE"},
            {id: 1700, n: "Kill Aura (Legit)", d: "Fark edilmeden seri vuruş yapar.", s: "ACTIVE"}
        ];

        // 1000'e tamamlamak için otomatik modüller ekle
        for(let i=1; i<=992; i++) {
            if(!featureData.find(f => f.id === 2000+i)) {
                featureData.push({
                    id: 2000 + i,
                    n: `Module_X_${i}`,
                    d: `Sistem optimizasyon ve veri işleme modülü ${i}.`,
                    s: "ACTIVE"
                });
            }
        }

        const listDiv = document.getElementById('matrixList');
        const searchInput = document.getElementById('searchBox');

        function showFeatures(filter = "") {
            listDiv.innerHTML = "";
            const filtered = featureData.filter(f => 
                f.n.toLowerCase().includes(filter.toLowerCase()) || 
                f.d.toLowerCase().includes(filter.toLowerCase())
            );

            filtered.forEach(f => {
                listDiv.innerHTML += `
                    <div class="feature-item">
                        <div class="feat-header">
                            <span>[#${f.id}] ${f.n}</span>
                            <span class="status-tag">${f.s}</span>
                        </div>
                        <div class="feat-desc">>> ${f.d}</div>
                    </div>
                `;
            });
        }

        searchInput.addEventListener('input', (e) => showFeatures(e.target.value));
        showFeatures(); // İlk açılışta listeyi yükle

        // CANLI LOG SİMÜLASYONU
        setInterval(() => {
            const netLogs = [">> Heartbeat OK", ">> Packet Encrypted", ">> Proxy Switched", ">> Uptime 100%"];
            const aiLogs = [">> Pazar taranıyor", ">> Admin radarı temiz", ">> Hedef belirlendi", ">> Gizlilik modu aktif"];
            
            document.getElementById('networkLogs').innerHTML += `<br> ${netLogs[Math.floor(Math.random()*4)]}`;
            document.getElementById('aiLogs').innerHTML += `<br> ${aiLogs[Math.floor(Math.random()*4)]}`;
            
            document.getElementById('networkLogs').scrollTop = 9999;
            document.getElementById('aiLogs').scrollTop = 9999;
        }, 3000);
    </script>
</body>
</html>
