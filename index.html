<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zalith ChatCraft Pro</title>
    <style>
        :root { --bg: #000000; --side: #151515; --accent: #39ff14; --purple: #bc13fe; --gray: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { height: 60px; background: #0a0a0a; display: flex; align-items: center; padding: 0 15px; border-bottom: 2px solid var(--purple); position: fixed; top: 0; width: 100%; z-index: 100; }
        .menu-btn { font-size: 28px; color: var(--accent); cursor: pointer; padding-right: 15px; }
        .title { font-size: 14px; font-weight: bold; color: #fff; letter-spacing: 1px; }

        /* YAN MENÜ (3 ÇİZGİYE BASINCA AÇILAN) */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--side); z-index: 200; transition: 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); border-right: 2px solid var(--purple); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 25px; background: #000; color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--gray); }
        
        /* 1000 ÖZELLİK LİSTESİ (SIDEBAR İÇİNDE) */
        .features-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .feature-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: #1a1a1a; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--gray); font-size: 14px; }
        .feature-item:active { background: var(--purple); }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; }
        .dot.on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* KONSOL EKRANI (ANA EKRAN) */
        .console { height: 100vh; padding: 80px 15px 80px 15px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; color: #bbb; }
        .msg { margin-bottom: 10px; word-break: break-all; }
        .msg b { color: var(--accent); }

        /* INPUT ALANI */
        .input-area { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--gray); }
        input { flex-grow: 1; background: #111; border: 1px solid var(--gray); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; }
        .send { background: var(--purple); color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }

        /* KARARTMA KATMANI */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 150; display: none; backdrop-filter: blur(3px); }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggle()">☰</div>
        <div class="title">ZALITH_BOT // play.falixnodes.net</div>
    </div>

    <div class="overlay" id="ov" onclick="toggle()"></div>

    <div class="sidebar" id="sb">
        <div class="sidebar-header">MODÜL KONTROL MERKEZİ</div>
        <div class="features-list" id="fl">
            </div>
    </div>

    <div class="console" id="con">
        <div class="msg"><b>[SİSTEM]:</b> Zalith OS başlatıldı.</div>
        <div class="msg"><b>[BİLGİ]:</b> 12GB RAM optimize edildi.</div>
        <div class="msg"><b>[AI]:</b> Knk 3 çizgiye basınca 1000 tane özellik seni bekliyor. Oradan her şeyi yönetebilirsin.</div>
    </div>

    <div class="input-area">
        <input type="text" placeholder="Komut yaz..." id="inp">
        <button class="send" onclick="send()">></button>
    </div>

<script>
    function toggle() {
        const sb = document.getElementById('sb');
        const ov = document.getElementById('ov');
        sb.classList.toggle('active');
        ov.style.display = (ov.style.display === 'block') ? 'none' : 'block';
        if(window.navigator.vibrate) window.navigator.vibrate(25);
    }

    // 1000 ÖZELLİĞİ YAN MENÜYE EKLE
    const fl = document.getElementById('fl');
    const hacks = { 1:'KillAura', 2:'Reach', 3:'AutoArmor', 4:'AdminRadar', 5:'PazarSabotaj', 6:'AntiKnockback', 7:'InventoryViewer', 8:'AutoLifesteal' };
    
    for(let i=1; i<=1000; i++) {
        let name = hacks[i] || `Modül_v${i+100}`;
        fl.innerHTML += `
            <div class="feature-item" onclick="vibrate()">
                <span>${name}</span>
                <div class="dot ${i < 9 ? 'on' : ''}"></div>
            </div>
        `;
    }

    function send() {
        const i = document.getElementById('inp');
        const c = document.getElementById('con');
        if(i.value) {
            c.innerHTML += `<div class="msg"><b>></b> ${i.value}</div>`;
            i.value = "";
            c.scrollTop = c.scrollHeight;
        }
    }

    function vibrate() { if(window.navigator.vibrate) window.navigator.vibrate(40); }
</script>
</body>
</html>
